name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.AI_CLUSTERING_RECOGNITION }}
        run: |
          git push --force https://mmorullo:$HF_TOKEN@huggingface.co/spaces/mmorullo/AI-Clustering-Recognition main