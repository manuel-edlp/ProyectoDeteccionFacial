<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo oscuro hacker -->
  <rect width="100" height="100" rx="20" fill="#0d1117"/>
  
  <!-- Bounding box de reconocimiento facial -->
  <rect x="25" y="25" width="50" height="50" fill="none" stroke="#4ade80" stroke-width="8" rx="8"/>
  
  <!-- El "Ojo" o Nodo Central de la AI -->
  <circle cx="50" cy="50" r="12" fill="#58a6ff"/>
  
  <!-- Conexiones / Crosshairs del tracker -->
  <path d="M 50 10 L 50 25 M 50 75 L 50 90 M 10 50 L 25 50 M 75 50 L 90 50" stroke="#4ade80" stroke-width="8" stroke-linecap="round"/>
</svg>
